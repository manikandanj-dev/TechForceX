<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#6366f1" />

    <!-- Bing Webmaster Tools verification -->
    <!-- Must be in static HTML — Bing reads the raw document before JS executes -->
    <meta name="msvalidate.01" content="83EFFCEEC405546A949FA0447D801580" />

    <!--
      Fallback description shown before React hydrates.
      react-helmet-async will override this on every route render.
    -->
    <meta
      name="description"
      content="Manikandan J — Software Engineer specializing in React.js and React Native, building scalable web and cross-platform mobile applications."
    />
    <meta name="author" content="Manikandan J" />

    <!--
      NOTE: No <title> tag here.
      react-helmet-async injects a unique <title> on every route.
      A static <title> in index.html causes TWO title tags in the DOM,
      which confuses Google's crawler and can trigger duplicate-content issues.
    -->

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://picsum.photos" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
