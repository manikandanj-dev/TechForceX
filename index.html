<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#6366f1" />

    <!--
      Fallback title & description shown before React hydrates.
      react-helmet-async will override these on every route render.
    -->
    <meta
      name="description"
      content="Manikandan J — Software Engineer specializing in React.js and React Native, building scalable web and cross-platform mobile applications."
    />
    <meta name="author" content="Manikandan J" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://picsum.photos" crossorigin />

    <!-- Fallback title (overridden per route by react-helmet-async) -->
    <title>Manikandan J | Software Engineer</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
